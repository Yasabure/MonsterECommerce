<div class="container py-5">
<div class="row justify-content-center">
  <div class="col-12 col-sm-10 col-md-7 col-lg-5">
    <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
      <div class="bg-dark text-center py-4">
        <img src="assets/monster-logo.webp" width="60" alt="">
        <h3 class="text-monster mt-2">Login</h3>
      </div>
      <div class="card-body p-5">
        <form (ngSubmit)="login()">
          <div class="mb-3">
            <label class="form-label fw-bold">E-mail</label>
            <input type="email" class="form-control rounded-3"
                   [(ngModel)]="credentials.email" name="email"
                   required placeholder="Digite seu e-mail">
          </div>
          <div class="mb-2">
            <label class="form-label fw-bold">Senha</label>
            <div class="input-group">
              <input [type]="showPassword ? 'text' : 'password'" class="form-control rounded-start-3"
                     [(ngModel)]="credentials.password" name="password"
                     required placeholder="********">
              <button class="btn btn-outline-secondary" type="button"
                      (click)="showPassword = !showPassword" tabindex="-1"
                      [title]="showPassword ? 'Ocultar senha' : 'Mostrar senha'">
                <i class="bi" [class.bi-eye]="!showPassword" [class.bi-eye-slash]="showPassword"></i>
              </button>
            </div>
          </div>
          <div class="text-end mb-4">
            <a routerLink="/esqueci-senha" class="text-muted small">Esqueceu sua senha?</a>
          </div>
          <button type="submit" class="btn btn-monster w-100 py-2 rounded-3 fw-bold shadow-sm">
            Entrar
          </button>
        </form>

        <div *ngIf="errorMessage" class="alert alert-danger mt-3 py-2">{{ errorMessage }}</div>

        <hr class="my-4">
        <div class="text-center small">
          Não tem uma conta?
          <a routerLink="/cadastro" class="text-monster fw-bold">Cadastre-se</a>
        </div>
      </div>
    </div>
  </div>
</div>
</div>
