<div class="container py-5">
<div class="row justify-content-center">
  <div class="col-12 col-sm-10 col-md-7 col-lg-5">
    <div class="card shadow-lg border-0 rounded-4 overflow-hidden">

      <div class="bg-dark text-center py-4">
        <img src="assets/monster-logo.webp" width="60" alt="">
        <h3 class="text-monster mt-2">Esqueci minha senha</h3>

        <div class="d-flex justify-content-center align-items-center gap-2 mt-3">
          <div class="step-dot" [class.active]="step >= 1">1</div>
          <div class="step-line" [class.active]="step >= 2"></div>
          <div class="step-dot" [class.active]="step >= 2">2</div>
        </div>
        <div class="d-flex justify-content-center gap-5 mt-1">
          <small class="text-muted" [class.text-monster]="step === 1">E-mail</small>
          <small class="text-muted" [class.text-monster]="step === 2">Nova senha</small>
        </div>
      </div>

      <div class="card-body p-5">

        <!-- ETAPA 1: e-mail -->
        <form *ngIf="step === 1" (ngSubmit)="sendCode()">
          <p class="text-muted small mb-3">
            Informe seu e-mail e enviaremos um código para redefinir sua senha.
          </p>
          <div class="mb-4">
            <label class="form-label fw-semibold">E-mail cadastrado</label>
            <input type="email" class="form-control" [(ngModel)]="email"
                   name="email" required placeholder="seuemail@exemplo.com">
          </div>
          <button type="submit" class="btn btn-monster w-100 py-2 fw-bold" [disabled]="loading">
            <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
            Enviar código
          </button>
        </form>

        <!-- ETAPA 2: código + nova senha -->
        <form *ngIf="step === 2" (ngSubmit)="resetPassword()">
          <div *ngIf="successMessage" class="alert alert-success py-2 mb-3">
            <i class="bi bi-envelope-check me-1"></i> {{ successMessage }}
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Código de verificação</label>
            <input type="text" class="form-control form-control-lg text-center fw-bold letter-spacing"
                   [(ngModel)]="code" name="code" required
                   maxlength="6" placeholder="000000" autocomplete="one-time-code">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Nova senha</label>
            <div class="input-group">
              <input [type]="showPassword ? 'text' : 'password'" class="form-control"
                     [(ngModel)]="newPassword" name="newPassword"
                     required placeholder="Mínimo 6 caracteres">
              <button class="btn btn-outline-secondary" type="button"
                      (click)="showPassword = !showPassword" tabindex="-1"
                      [title]="showPassword ? 'Ocultar' : 'Mostrar'">
                <i class="bi" [class.bi-eye]="!showPassword" [class.bi-eye-slash]="showPassword"></i>
              </button>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Confirmar nova senha</label>
            <div class="input-group">
              <input [type]="showConfirm ? 'text' : 'password'" class="form-control"
                     [(ngModel)]="confirmPassword" name="confirmPassword"
                     required placeholder="Repita a nova senha">
              <button class="btn btn-outline-secondary" type="button"
                      (click)="showConfirm = !showConfirm" tabindex="-1"
                      [title]="showConfirm ? 'Ocultar' : 'Mostrar'">
                <i class="bi" [class.bi-eye]="!showConfirm" [class.bi-eye-slash]="showConfirm"></i>
              </button>
            </div>
            <div *ngIf="confirmPassword && newPassword !== confirmPassword"
                 class="form-text text-danger">
              <i class="bi bi-x-circle me-1"></i>As senhas não coincidem.
            </div>
            <div *ngIf="confirmPassword && newPassword === confirmPassword && confirmPassword.length > 0"
                 class="form-text text-success">
              <i class="bi bi-check-circle me-1"></i>Senhas conferem.
            </div>
          </div>
          <button type="submit" class="btn btn-monster w-100 py-2 fw-bold mb-2" [disabled]="loading">
            <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
            Redefinir senha
          </button>
          <button type="button" class="btn btn-outline-secondary w-100 btn-sm" (click)="backToStep1()">
            <i class="bi bi-arrow-left me-1"></i> Voltar
          </button>
        </form>

        <div *ngIf="errorMessage" class="alert alert-danger mt-3 py-2">{{ errorMessage }}</div>

        <hr class="my-4">
        <div class="text-center small">
          Lembrou a senha? <a routerLink="/login" class="text-monster fw-bold">Fazer login</a>
        </div>
      </div>

    </div>
  </div>
</div>
</div>
